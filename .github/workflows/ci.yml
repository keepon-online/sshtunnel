name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  ubuntu-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check frontend syntax
        run: node --check web/app.js

      - name: Run core tests
        run: cargo test -p sshtunnel-core

      - name: Check Tauri app
        run: cargo check -p sshtunnel-app

  ubuntu-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Linux deb bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles deb

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

  windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Windows NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles nsis

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error
