<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSH 隧道管理器</title>
  <script>
    (function() {
      try {
        const storedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="shell">
    <aside class="control-column">
      <section class="brand-card">
        <p class="eyebrow">SSH Tunnel Manager</p>
        <h1>隧道管理</h1>
        <p class="muted">
          管理连接、监控状态、快速诊断。
        </p>
      </section>

      <div class="control-actions">
        <button id="new-tunnel">新建隧道</button>
        <div style="flex: 1;"></div>
        <button id="settings-btn" class="secondary icon-button" style="min-width: unset; padding: 10px 14px;" aria-label="全局设置" title="全局设置">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>

        <button id="theme-toggle" class="secondary icon-button" style="min-width: unset; padding: 10px 14px;" aria-label="切换主题" title="切换主题">
          <svg id="theme-icon-light" class="theme-icon hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg id="theme-icon-dark" class="theme-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>


      <section class="list-section">
        <div class="list-head">
          <div>
            <p class="eyebrow">隧道</p>
            <h2>隧道列表</h2>
          </div>
        </div>
        <div id="tunnel-list" class="tunnel-list"></div>
      </section>
    </aside>

    <main class="command-center">
      <section class="workspace-panel">
        <section class="hero-card">
          <div class="hero-top">
            <div class="hero-copy">
              <p class="eyebrow">当前隧道</p>
              <h2 id="workspace-title">选择一个隧道</h2>
              <p id="workspace-subtitle" class="workspace-subtitle muted">从左侧选择现有隧道，或创建一个新的本地转发配置。</p>
            </div>
            <div class="actions workspace-actions">
              <button id="connect-btn">连接</button>
              <button id="disconnect-btn" class="secondary">断开</button>
              <button id="edit-btn" class="secondary">编辑</button>
              <button id="delete-btn" class="danger">删除</button>
            </div>
          </div>
          <div class="hero-status">
            <p id="status-label" class="eyebrow">连接状态</p>
            <div id="status-card" class="status-card idle">未选择</div>
          </div>
          <div class="hero-properties">
            <div class="property-row">
              <div class="property-cell">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="property-icon"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                <span id="forward-label" class="eyebrow inline">本地转发</span>
              </div>
              <div id="forward-card" class="summary-value muted font-mono text-sm">选择隧道后显示转发目标</div>
            </div>

            <div class="property-row">
              <div class="property-cell">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="property-icon"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <span id="auth-label" class="eyebrow inline">认证方式</span>
              </div>
              <div class="property-content-group">
                <div id="auth-card" class="summary-value muted text-sm">选择隧道后显示认证方式</div>
                <div id="auth-meta" class="summary-meta text-xs"></div>
              </div>
            </div>

            <div class="property-row last">
              <div class="property-cell">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="property-icon"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                <span class="eyebrow inline">连接健康</span>
              </div>
              <div class="property-content-group">
                <div id="status-subtitle" class="status-subtitle muted text-sm">从左侧选择现有隧道，或创建一个新的转发配置。</div>
                <div id="status-error" class="status-error hidden"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="timeline-card">
          <div class="timeline-head">
            <div>
              <p class="eyebrow">故障排查</p>
              <h3>连接时间线</h3>
            </div>
            <p id="log-summary" class="muted log-summary">暂无最近日志</p>
          </div>
          <div class="timeline-grid">
            <section class="timeline-lane">
              <div class="timeline-lane-head">状态事件</div>
              <div id="status-events-log" class="log-panel"></div>
            </section>
            <section class="timeline-lane">
              <div class="timeline-lane-head">SSH 输出</div>
              <div id="ssh-output-log" class="log-panel"></div>
            </section>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="drawer-backdrop" class="drawer-backdrop hidden" aria-hidden="true"></div>
  <aside id="editor-drawer" class="editor-drawer hidden" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <p class="eyebrow">编辑器</p>
        <h2 id="form-title">新建隧道</h2>
      </div>
      <button id="close-drawer" type="button" class="secondary icon-button">关闭</button>
    </div>

    <form id="tunnel-form" class="form-grid">
      <input type="hidden" id="tunnel-id">

      <label>
        <span>名称</span>
        <input id="name" required>
      </label>

      <label>
        <span>认证方式</span>
        <select id="auth-kind">
          <option value="private_key">密钥</option>
          <option value="password">密码</option>
        </select>
      </label>

      <label>
        <span>SSH 主机</span>
        <input id="ssh-host" placeholder="bastion.example.com" required>
      </label>

      <label>
        <span>SSH 端口</span>
        <input id="ssh-port" type="number" value="22" min="1" max="65535" required>
      </label>

      <label>
        <span>用户名</span>
        <input id="username" required>
      </label>

      <label>
        <span>私钥路径</span>
        <div class="field-with-action">
          <input id="private-key-path" placeholder="~/.ssh/id_ed25519">
          <button id="pick-private-key" type="button" class="secondary inline-action">选择文件</button>
        </div>
      </label>

      <label>
        <span>本地监听地址</span>
        <input id="local-bind-address" value="127.0.0.1" required>
      </label>

      <label>
        <span>本地端口</span>
        <input id="local-bind-port" type="number" value="15432" min="1" max="65535" required>
      </label>

      <label>
        <span>远端目标主机</span>
        <input id="remote-host" placeholder="10.0.0.12" required>
      </label>

      <label>
        <span>远端目标端口</span>
        <input id="remote-port" type="number" value="5432" min="1" max="65535" required>
      </label>

      <label class="full-width password-row">
        <span>密码</span>
        <input id="password" type="password" placeholder="仅密码认证时填写，保存到系统凭据库">
      </label>

      <div id="editor-error" class="editor-error hidden full-width"></div>

      <label class="checkbox">
        <input id="auto-connect" type="checkbox">
        <span>应用启动后自动连接</span>
      </label>

      <label class="checkbox">
        <input id="auto-reconnect" type="checkbox" checked>
        <span>断开后自动重连</span>
      </label>

      <div class="full-width form-actions">
        <button id="cancel-edit" type="button" class="secondary">取消</button>
        <button id="save-tunnel" type="submit">保存配置</button>
      </div>
    </form>
  </aside>

  <dialog id="settings-modal" class="settings-modal">
    <div class="settings-head">
      <h2 class="settings-title">全局偏好设置</h2>
      <button id="close-settings" type="button" class="secondary icon-button" aria-label="关闭" title="关闭">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <h3 class="eyebrow">系统环境与常驻</h3>
        <div class="meta-row compact">
          <span>系统 SSH 可执行文件</span>
          <strong id="ssh-status">检查中</strong>
        </div>
        <div class="meta-row compact">
          <span>自启动策略 (开机自启)</span>
          <strong id="autostart-status">检查中</strong>
        </div>
        <button id="autostart-toggle" type="button" class="secondary meta-button full-width-btn" style="margin-top: 12px;">检查中</button>
      </div>
      <div class="settings-section">
        <h3 class="eyebrow">配置文件路径</h3>
        <code id="config-path" class="path-code">-</code>
      </div>
    </div>
  </dialog>

  <script src="./view-model.js"></script>
  <script src="./app.js"></script>
</body>
</html>
